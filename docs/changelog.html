<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changelog — nano-brain</title>
  <meta name="description" content="Release history and changelog for nano-brain.">
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" href="assets/nano-step-logo.png">
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    .page-hero { padding: 64px 0 48px; }

    /* Rendered markdown styles */
    #changelog-content { max-width: 760px; }
    #changelog-content h1 { display: none; } /* hide top-level title, we have page-hero */
    #changelog-content h2 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-top: 56px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #changelog-content h2::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 1px var(--accent);
      flex-shrink: 0;
    }
    #changelog-content h3 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-top: 24px;
      margin-bottom: 10px;
    }
    #changelog-content ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    #changelog-content li {
      font-size: 14px;
      color: var(--text-muted);
      padding-left: 16px;
      position: relative;
      line-height: 1.6;
    }
    #changelog-content li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--text-subtle);
    }
    #changelog-content li strong { color: var(--text); font-weight: 600; }
    #changelog-content code {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--accent);
    }
    #changelog-content a { color: var(--accent); }
    #changelog-content a:hover { text-decoration: underline; }
    #changelog-content p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 12px;
    }
    #changelog-content p strong {
      color: var(--text);
    }
    #changelog-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0;
    }

    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 14px;
      font-family: var(--mono);
      padding: 40px 0;
    }
    .loading-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1s infinite;
    }
    .error-msg {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 8px;
      padding: 16px 20px;
      color: #f87171;
      font-size: 14px;
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="index.html">
      <img src="assets/nano-step-logo.png" alt="nano-step">
      <span class="nav-brand-name">nano-brain</span>
      <span class="nav-brand-version">v2026.8.19</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="features.html">Features</a>
      <a href="docs.html">Docs</a>
      <a href="setup.html">Setup</a>
      <a href="changelog.html" class="active">Changelog</a>
    </div>
    <div class="nav-actions">
      <a class="nav-badge" href="https://www.npmjs.com/package/nano-brain" target="_blank">
        <span class="nav-badge-dot"></span>npm v2026.8.19
      </a>
      <a class="nav-badge" href="https://github.com/nano-step/nano-brain" target="_blank">GitHub ↗</a>
    </div>
  </div>
</nav>

<div class="page-hero">
  <div class="container">
    <p class="eyebrow">Release history</p>
    <h1 style="font-size:clamp(28px,4vw,44px);margin-bottom:12px">Changelog</h1>
    <p class="lead">All notable changes to nano-brain. Follows <a href="https://keepachangelog.com" target="_blank">Keep a Changelog</a>.</p>
    <div style="display:flex;gap:8px;margin-top:20px;flex-wrap:wrap">
      <a href="https://github.com/nano-step/nano-brain/releases" target="_blank" class="btn btn-secondary" style="font-size:14px;padding:8px 16px">All releases on GitHub ↗</a>
      <a href="https://github.com/nano-step/nano-brain/blob/master/CHANGELOG.md" target="_blank" class="btn btn-secondary" style="font-size:14px;padding:8px 16px">View CHANGELOG.md ↗</a>
    </div>
  </div>
</div>

<div class="section" style="padding-top:0">
  <div class="container">
    <div id="changelog-loading" class="loading">
      <span class="loading-dot"></span>
      Loading CHANGELOG.md...
    </div>
    <div id="changelog-content"></div>
  </div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <img src="assets/nano-step-logo.png" alt="nano-step">
      <span>nano-brain by <a href="https://github.com/nano-step" target="_blank" style="color:var(--text-muted)">nano-step</a> · MIT License</span>
    </div>
    <div class="footer-links">
      <a href="https://github.com/nano-step/nano-brain" target="_blank">GitHub</a>
      <a href="https://www.npmjs.com/package/nano-brain" target="_blank">npm</a>
      <a href="index.html">Home</a>
      <a href="docs.html">Docs</a>
    </div>
  </div>
</footer>

<script>
  // Resolve CHANGELOG.md path relative to the page
  const changelogUrl = new URL('../CHANGELOG.md', window.location.href).href;

  fetch(changelogUrl)
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.text();
    })
    .then(md => {
      document.getElementById('changelog-loading').style.display = 'none';
      document.getElementById('changelog-content').innerHTML = marked.parse(md);
    })
    .catch(err => {
      document.getElementById('changelog-loading').style.display = 'none';
      document.getElementById('changelog-content').innerHTML =
        `<div class="error-msg">Failed to load CHANGELOG.md: ${err.message}<br>
        <a href="https://github.com/nano-step/nano-brain/blob/master/CHANGELOG.md" target="_blank" style="color:#f87171">View on GitHub ↗</a></div>`;
    });
</script>
</body>
</html>
